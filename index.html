<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Desktop Calendar</title>
    <style>
        :root {
            --color-dark: #1b2538;
            --color-light: #d8e5e9;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        *::-webkit-scrollbar {
            display: none;
        }

        body {
            background-color: var(--color-dark);
            color: var(--color-light);
            font-family: var(--font-sans);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            cursor: default;
            user-select: none;
        }

        .background {
            position: fixed;
            inset: 0;
            opacity: 0.4;
            mix-blend-mode: overlay;
            pointer-events: none;
            background: 
                radial-gradient(circle at 20% 30%, #d8e5e9 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, #1b2538 0%, transparent 50%);
            filter: blur(100px);
            z-index: 0;
        }

        .app-container {
            position: relative;
            z-index: 1;
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 3rem;
            overflow: hidden;
        }

        header {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 200;
            letter-spacing: -0.05em;
            color: rgba(216, 229, 233, 0.9);
        }

        .header-sub {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: rgba(216, 229, 233, 0.4);
            margin-top: 0.5rem;
            margin-left: 0.25rem;
        }

        .calendar-grid {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1rem;
            width: 100%;
        }

        .week-view, .day-view {
            flex: 1;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            padding-right: 1rem;
        }

        .week-view.active, .day-view.active {
            display: flex;
        }

        .day-headers {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1rem;
            margin-bottom: 0.75rem;
            width: 100%;
        }

        .day-header {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(216, 229, 233, 0.3);
            text-align: left;
            padding-left: 1rem;
            font-weight: 600;
        }

        .month-view-container {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .month-view-container.active {
            display: flex;
        }

        /* Tabs Styling */
        .view-tabs {
            display: flex;
            gap: 1.5rem;
            margin-top: 1.5rem;
            border-bottom: 1px solid rgba(216, 229, 233, 0.1);
        }

        .view-tab {
            background: transparent;
            border: none;
            color: rgba(216, 229, 233, 0.3);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            padding: 0.75rem 0;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .view-tab.active {
            color: var(--color-light);
        }

        .view-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--color-light);
        }

        /* Week View Styling */
        .week-view {
            gap: 1.5rem;
        }

        .week-day-row {
            display: flex;
            gap: 1.5rem;
            background: rgba(216, 229, 233, 0.03);
            border: 1px solid rgba(216, 229, 233, 0.05);
            border-radius: 1.5rem;
            padding: 1.5rem;
            transition: var(--transition);
            cursor: pointer;
        }

        .week-day-row:hover {
            background: rgba(216, 229, 233, 0.06);
            border-color: rgba(216, 229, 233, 0.2);
        }

        .week-day-info {
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid rgba(216, 229, 233, 0.1);
            padding-right: 1.5rem;
        }

        .week-day-name {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(216, 229, 233, 0.4);
        }

        .week-day-num {
            font-size: 2rem;
            font-weight: 200;
        }

        .week-day-events {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-content: flex-start;
        }

        /* Day View Styling */
        .day-view {
            gap: 2rem;
        }

        .day-view-header {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .day-view-num {
            font-size: 8rem;
            font-weight: 100;
            line-height: 1;
            color: rgba(216, 229, 233, 0.8);
        }

        .day-view-details {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .day-view-name {
            font-size: 1.5rem;
            font-weight: 200;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(216, 229, 233, 0.4);
        }

        .day-view-events-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .day-view-item {
            background: rgba(216, 229, 233, 0.05);
            border: 1px solid rgba(216, 229, 233, 0.1);
            padding: 2rem;
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .day-view-item-time {
            font-size: 0.8rem;
            color: rgba(216, 229, 233, 0.4);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .day-view-item-text {
            font-size: 1.25rem;
            font-weight: 300;
        }

        .view-nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .nav-btn {
            background: rgba(216, 229, 233, 0.05);
            border: 1px solid rgba(216, 229, 233, 0.1);
            color: var(--color-light);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: var(--transition);
        }

        .nav-btn:hover {
            background: rgba(216, 229, 233, 0.1);
            border-color: rgba(216, 229, 233, 0.3);
        }

        .clock {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 200;
            color: rgba(216, 229, 233, 0.3);
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }

        .day-card {
            aspect-ratio: 1;
            background: transparent;
            border: 1px solid rgba(216, 229, 233, 0.1);
            border-radius: 1.25rem;
            padding: 1rem;
            text-align: left;
            transition: var(--transition);
            position: relative;
            cursor: pointer;
        }

        .day-card:hover {
            background: rgba(216, 229, 233, 0.05);
            border-color: rgba(216, 229, 233, 0.4);
            transform: translateY(-2px);
        }

        .day-card.today {
            background: rgba(216, 229, 233, 0.1);
            border-color: rgba(216, 229, 233, 0.3);
            box-shadow: 0 0 20px rgba(216, 229, 233, 0.05);
        }

        .day-number {
            font-size: 1.5rem;
            font-weight: 200;
            color: rgba(216, 229, 233, 0.4);
            transition: var(--transition);
        }

        .day-card:hover .day-number, .day-card.today .day-number {
            color: var(--color-light);
        }

        .day-events {
            position: absolute;
            bottom: 0.75rem;
            left: 0.75rem;
            right: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .event-pill {
            font-size: 0.6rem;
            background: rgba(216, 229, 233, 0.05);
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: rgba(216, 229, 233, 0.7);
        }

        .today-dot {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 6px;
            height: 6px;
            background: var(--color-light);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--color-light);
        }

        aside {
            width: 320px;
            background: rgba(27, 37, 56, 0.4);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(216, 229, 233, 0.1);
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .aside-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: rgba(216, 229, 233, 0.6);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .tab-view {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            overflow-y: auto;
            flex: 1;
            padding-right: 0.5rem;
        }

        .upcoming-item-day {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(216, 229, 233, 0.3);
            margin-bottom: 0.25rem;
        }

        .agenda-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .agenda-title {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .agenda-title h3 {
            font-size: 1.5rem;
            font-weight: 200;
        }

        .agenda-title span {
            font-size: 0.7rem;
            opacity: 0.3;
        }

        .agenda-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .agenda-item {
            background: rgba(216, 229, 233, 0.03);
            border: 1px solid rgba(216, 229, 233, 0.05);
            padding: 0.75rem;
            border-radius: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            transition: var(--transition);
        }

        .agenda-item:hover {
            background: rgba(216, 229, 233, 0.06);
            border-color: rgba(216, 229, 233, 0.1);
        }

        .agenda-item-text {
            font-size: 0.85rem;
            color: rgba(216, 229, 233, 0.9);
        }

        .agenda-item-time {
            font-size: 0.65rem;
            color: rgba(216, 229, 233, 0.4);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(27, 37, 56, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 1rem;
        }

        .modal-content {
            background: var(--color-dark);
            width: 100%;
            max-width: 500px;
            border-radius: 2rem;
            border: 1px solid rgba(216, 229, 233, 0.2);
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
            opacity: 1;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
        }

        .modal-title h2 {
            font-size: 2rem;
            font-weight: 200;
        }

        .modal-title p {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(216, 229, 233, 0.4);
            margin-top: 0.25rem;
        }

        .close-btn {
            background: transparent;
            border: none;
            color: rgba(216, 229, 233, 0.4);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: var(--transition);
        }

        .clear-all-btn {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.2);
            color: #ff4444;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: var(--transition);
            display: none;
        }

        .clear-all-btn:hover {
            background: rgba(255, 68, 68, 0.2);
            border-color: rgba(255, 68, 68, 0.4);
        }

        .close-btn:hover {
            background: rgba(216, 229, 233, 0.1);
            color: var(--color-light);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .input-row {
            display: flex;
            gap: 0.5rem;
        }

        input[type="text"], input[type="time"] {
            background: rgba(216, 229, 233, 0.05);
            border: 1px solid rgba(216, 229, 233, 0.1);
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            color: var(--color-light);
            font-family: var(--font-sans);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        input[type="text"] { flex: 1; }
        input[type="time"] { width: 140px; }

        input:focus {
            border-color: rgba(216, 229, 233, 0.4);
            background: rgba(216, 229, 233, 0.08);
        }

        .add-btn {
            background: var(--color-light);
            color: var(--color-dark);
            border: none;
            padding: 1rem;
            border-radius: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .add-btn:hover {
            background: #fff;
            transform: scale(1.05);
        }

        .event-list {
            max-height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding-right: 0.5rem;
        }

        .event-item {
            background: rgba(216, 229, 233, 0.03);
            border: 1px solid rgba(216, 229, 233, 0.05);
            padding: 1rem;
            border-radius: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .event-item-info {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: rgba(216, 229, 233, 0.2);
            cursor: pointer;
            padding: 0.5rem;
            transition: var(--transition);
        }

        .delete-btn:hover {
            color: #ff4444;
        }

        @media (max-width: 900px) {
            aside { display: none; }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    
    <div class="app-container">
        <main>
            <header>
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div>
                        <div style="display: flex; align-items: baseline; gap: 2rem;">
                            <h1 id="current-month">Month</h1>
                            <div class="clock" id="digital-clock">00:00:00</div>
                        </div>
                        <p class="header-sub" id="current-year">2026 • Desktop Layer</p>
                    </div>
                    
                    <div class="view-nav" id="view-nav" style="display: none;">
                        <button class="nav-btn" id="prev-btn">Prev</button>
                        <button class="nav-btn" id="next-btn">Next</button>
                    </div>
                </div>

                <div class="view-tabs">
                    <button class="view-tab active" data-view="month">Month</button>
                    <button class="view-tab" data-view="week">Week</button>
                    <button class="view-tab" data-view="day">Day</button>
                </div>
            </header>
            
            <div id="month-view-container" class="month-view-container active">
                <div class="day-headers" id="day-headers">
                    <div class="day-header">Sun</div>
                    <div class="day-header">Mon</div>
                    <div class="day-header">Tue</div>
                    <div class="day-header">Wed</div>
                    <div class="day-header">Thu</div>
                    <div class="day-header">Fri</div>
                    <div class="day-header">Sat</div>
                </div>
                <div class="calendar-grid" id="calendar-grid"></div>
            </div>
            <div class="week-view" id="week-view"></div>
            <div class="day-view" id="day-view"></div>
        </main>

        <aside>
            <div class="aside-header">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                Agenda
            </div>
            
            <div class="tab-view" id="view-agenda">
                <div class="agenda-section">
                    <div class="agenda-title">
                        <h3>Today</h3>
                        <span id="today-num">--</span>
                    </div>
                    <div class="agenda-list" id="today-list"></div>
                </div>

                <div class="agenda-section">
                    <div class="agenda-title">
                        <h3>Tomorrow</h3>
                        <span id="tomorrow-num">--</span>
                    </div>
                    <div class="agenda-list" id="tomorrow-list"></div>
                </div>

                <div class="agenda-section">
                    <div class="agenda-title">
                        <h3>Upcoming</h3>
                    </div>
                    <div class="agenda-list" id="upcoming-list"></div>
                </div>
            </div>

            <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid rgba(216, 229, 233, 0.05);">
                <div style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.2em; color: rgba(216, 229, 233, 0.2);">
                    <div style="width: 4px; height: 4px; background: rgba(216, 229, 233, 0.4); border-radius: 50%;"></div>
                    Live Sync Active
                </div>
            </div>
        </aside>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">
                    <h2 id="modal-day-title">Day --</h2>
                    <p>Manage Events</p>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button class="clear-all-btn" id="clear-all-btn">Clear All</button>
                    <button class="close-btn" id="close-modal">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>

            <div class="input-group">
                <div class="input-row">
                    <input type="text" id="event-input" placeholder="What's happening?">
                    <input type="time" id="time-input">
                </div>
                <button class="add-btn" id="add-event-btn">Add Event</button>
            </div>

            <div class="event-list" id="modal-event-list"></div>
        </div>
    </div>

    <script>
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        const state = {
            entries: (() => {
                const v3 = localStorage.getItem('calendar_entries_v3');
                if (v3) return JSON.parse(v3);
                
                const v2 = localStorage.getItem('calendar_entries_v2');
                if (v2) {
                    try {
                        const oldEntries = JSON.parse(v2);
                        const migrated = {};
                        Object.entries(oldEntries).forEach(([day, list]) => {
                            migrated[day] = list.map(text => ({ text, time: '' }));
                        });
                        localStorage.setItem('calendar_entries_v3', JSON.stringify(migrated));
                        return migrated;
                    } catch (e) { console.error(e); }
                }
                return {};
            })(),
            selectedDay: null,
            activeView: 'month',
            viewDay: new Date().getDate(),
            today: new Date().getDate(),
            month: new Intl.DateTimeFormat('en-US', { month: 'long' }).format(new Date()),
            year: new Date().getFullYear()
        };

        const elements = {
            grid: document.getElementById('calendar-grid'),
            month: document.getElementById('current-month'),
            clock: document.getElementById('digital-clock'),
            year: document.getElementById('current-year'),
            todayNum: document.getElementById('today-num'),
            tomorrowNum: document.getElementById('tomorrow-num'),
            todayList: document.getElementById('today-list'),
            tomorrowList: document.getElementById('tomorrow-list'),
            modal: document.getElementById('modal-overlay'),
            modalTitle: document.getElementById('modal-day-title'),
            eventInput: document.getElementById('event-input'),
            timeInput: document.getElementById('time-input'),
            addBtn: document.getElementById('add-event-btn'),
            clearAllBtn: document.getElementById('clear-all-btn'),
            closeBtn: document.getElementById('close-modal'),
            modalEventList: document.getElementById('modal-event-list'),
            viewAgenda: document.getElementById('view-agenda'),
            upcomingList: document.getElementById('upcoming-list'),
            monthViewContainer: document.getElementById('month-view-container'),
            weekView: document.getElementById('week-view'),
            dayView: document.getElementById('day-view'),
            viewTabs: document.querySelectorAll('.view-tab'),
            viewNav: document.getElementById('view-nav'),
            prevBtn: document.getElementById('prev-btn'),
            nextBtn: document.getElementById('next-btn')
        };

        function save() {
            localStorage.setItem('calendar_entries_v3', JSON.stringify(state.entries));
            render();
        }

        function render() {
            const monthIndex = monthNames.indexOf(state.month);
            const daysInMonth = new Date(state.year, monthIndex + 1, 0).getDate();

            elements.month.textContent = state.month;
            elements.year.textContent = `${state.year} • Desktop Layer`;
            elements.todayNum.textContent = state.today;
            elements.tomorrowNum.textContent = state.today === daysInMonth ? 1 : state.today + 1;
            updateClock();

            // Toggle views
            elements.monthViewContainer.classList.toggle('active', state.activeView === 'month');
            elements.weekView.classList.toggle('active', state.activeView === 'week');
            elements.dayView.classList.toggle('active', state.activeView === 'day');
            elements.viewNav.style.display = state.activeView === 'month' ? 'none' : 'flex';

            if (state.activeView === 'month') {
                renderMonthView();
            } else if (state.activeView === 'week') {
                renderWeekView();
            } else if (state.activeView === 'day') {
                renderDayView();
            }

            // Render Agenda
            renderAgenda(state.today, elements.todayList);
            renderAgenda(state.today === 31 ? 1 : state.today + 1, elements.tomorrowList);
            renderUpcoming();
        }

        function renderMonthView() {
            elements.grid.innerHTML = '';
            
            const monthIndex = monthNames.indexOf(state.month);
            const firstDayOfMonth = new Date(state.year, monthIndex, 1).getDay();
            const daysInMonth = new Date(state.year, monthIndex + 1, 0).getDate();

            for (let i = 0; i < firstDayOfMonth; i++) {
                const empty = document.createElement('div');
                empty.style.opacity = '0';
                elements.grid.appendChild(empty);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const card = document.createElement('div');
                card.className = `day-card ${i === state.today ? 'today' : ''}`;
                card.innerHTML = `
                    <span class="day-number">${i.toString().padStart(2, '0')}</span>
                    <div class="day-events">
                        ${(state.entries[i] || []).slice(0, 2).map(e => `<div class="event-pill">${e.time ? e.time + ' ' : ''}${e.text}</div>`).join('')}
                        ${(state.entries[i] || []).length > 2 ? `<div class="event-pill" style="opacity: 0.4">+ ${(state.entries[i] || []).length - 2} more</div>` : ''}
                    </div>
                    ${i === state.today ? '<div class="today-dot"></div>' : ''}
                `;
                card.onclick = () => openModal(i);
                elements.grid.appendChild(card);
            }
        }

        function renderWeekView() {
            elements.weekView.innerHTML = '';
            const startDay = state.viewDay;
            const monthIndex = monthNames.indexOf(state.month);
            const daysInMonth = new Date(state.year, monthIndex + 1, 0).getDate();
            
            for (let i = 0; i < 7; i++) {
                let day = startDay + i;
                let displayMonthIndex = monthIndex;
                let displayYear = state.year;

                if (day > daysInMonth) {
                    day = day - daysInMonth;
                    displayMonthIndex++;
                    if (displayMonthIndex > 11) {
                        displayMonthIndex = 0;
                        displayYear++;
                    }
                } else if (day < 1) {
                    const prevMonthDays = new Date(state.year, monthIndex, 0).getDate();
                    day = prevMonthDays + day;
                    displayMonthIndex--;
                    if (displayMonthIndex < 0) {
                        displayMonthIndex = 11;
                        displayYear--;
                    }
                }
                
                const date = new Date(displayYear, displayMonthIndex, day);
                const dayName = new Intl.DateTimeFormat('en-US', { weekday: 'short' }).format(date);
                
                const row = document.createElement('div');
                row.className = 'week-day-row';
                row.onclick = () => openModal(day);
                
                const entries = state.entries[day] || [];
                
                row.innerHTML = `
                    <div class="week-day-info">
                        <div class="week-day-name">${dayName}</div>
                        <div class="week-day-num">${day.toString().padStart(2, '0')}</div>
                    </div>
                    <div class="week-day-events">
                        ${entries.map(e => `<div class="event-pill">${e.time ? e.time + ' ' : ''}${e.text}</div>`).join('')}
                        ${entries.length === 0 ? '<span style="opacity: 0.1; font-size: 0.7rem; font-style: italic;">No events</span>' : ''}
                    </div>
                `;
                elements.weekView.appendChild(row);
            }
        }

        function renderDayView() {
            elements.dayView.innerHTML = '';
            const day = state.viewDay;
            const monthIndex = monthNames.indexOf(state.month);
            const date = new Date(state.year, monthIndex, day);
            const dayName = new Intl.DateTimeFormat('en-US', { weekday: 'long' }).format(date);
            
            const entries = state.entries[day] || [];
            
            elements.dayView.innerHTML = `
                <div class="day-view-header">
                    <div class="day-view-num">${day.toString().padStart(2, '0')}</div>
                    <div class="day-view-details">
                        <div class="day-view-name">${dayName}</div>
                        <div style="font-size: 0.8rem; opacity: 0.4;">${entries.length} Events Scheduled</div>
                        <button class="add-btn" style="margin-top: 1rem; width: fit-content;" onclick="openModal(${day})">+ Add Event</button>
                    </div>
                </div>
                <div class="day-view-events-list">
                    ${entries.sort((a, b) => (a.time || '99:99').localeCompare(b.time || '99:99')).map(e => `
                        <div class="day-view-item">
                            ${e.time ? `<div class="day-view-item-time"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>${e.time}</div>` : ''}
                            <div class="day-view-item-text">${e.text}</div>
                        </div>
                    `).join('')}
                    ${entries.length === 0 ? '<div style="grid-column: 1/-1; text-align: center; padding: 4rem; opacity: 0.2; font-style: italic;">No events scheduled for this day</div>' : ''}
                </div>
            `;
        }

        function renderUpcoming() {
            elements.upcomingList.innerHTML = '';
            const monthIndex = monthNames.indexOf(state.month);
            const daysInMonth = new Date(state.year, monthIndex + 1, 0).getDate();
            const tomorrow = state.today === daysInMonth ? 1 : state.today + 1;
            
            // Get all days with entries that are after tomorrow
            const upcomingDays = Object.keys(state.entries)
                .map(Number)
                .filter(day => day > tomorrow)
                .sort((a, b) => a - b);

            if (upcomingDays.length === 0) {
                elements.upcomingList.innerHTML = '<p style="font-size: 0.7rem; opacity: 0.2; font-style: italic;">No upcoming events</p>';
                return;
            }

            upcomingDays.forEach(day => {
                const dayEntries = state.entries[day];
                dayEntries.sort((a, b) => (a.time || '99:99').localeCompare(b.time || '99:99')).forEach(e => {
                    const item = document.createElement('div');
                    item.className = 'agenda-item';
                    item.innerHTML = `
                        <div class="upcoming-item-day">Day ${day}</div>
                        <div class="agenda-item-text">${e.text}</div>
                        ${e.time ? `<div class="agenda-item-time"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>${e.time}</div>` : ''}
                    `;
                    elements.upcomingList.appendChild(item);
                });
            });
        }

        function renderAgenda(day, container) {
            const monthIndex = monthNames.indexOf(state.month);
            const daysInMonth = new Date(state.year, monthIndex + 1, 0).getDate();
            const dayEntries = state.entries[day] || [];
            container.innerHTML = '';
            if (dayEntries.length === 0) {
                container.innerHTML = '<p style="font-size: 0.7rem; opacity: 0.2; font-style: italic;">No events</p>';
                return;
            }
            dayEntries.sort((a, b) => (a.time || '99:99').localeCompare(b.time || '99:99')).forEach(e => {
                const item = document.createElement('div');
                item.className = 'agenda-item';
                item.innerHTML = `
                    <div class="agenda-item-text">${e.text}</div>
                    ${e.time ? `<div class="agenda-item-time"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>${e.time}</div>` : ''}
                `;
                container.appendChild(item);
            });
        }

        function openModal(day) {
            state.selectedDay = day;
            elements.modalTitle.textContent = `${state.month} ${day}`;
            elements.modal.classList.add('active');
            elements.eventInput.focus();
            elements.clearAllBtn.textContent = 'Clear All';
            elements.clearAllBtn.dataset.confirm = 'false';
            renderModalEvents();
        }

        function closeModal() {
            elements.modal.classList.remove('active');
            state.selectedDay = null;
        }

        function renderModalEvents() {
            const dayEntries = state.entries[state.selectedDay] || [];
            elements.modalEventList.innerHTML = '';
            
            if (dayEntries.length > 0) {
                elements.clearAllBtn.style.display = 'block';
            } else {
                elements.clearAllBtn.style.display = 'none';
            }

            dayEntries.forEach((e, index) => {
                const item = document.createElement('div');
                item.className = 'event-item';
                item.innerHTML = `
                    <div class="event-item-info">
                        <div class="agenda-item-text">${e.text}</div>
                        ${e.time ? `<div class="agenda-item-time">${e.time}</div>` : ''}
                    </div>
                    <button class="delete-btn" onclick="deleteEvent(${index})">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    </button>
                `;
                elements.modalEventList.appendChild(item);
            });
        }

        function deleteEvent(index) {
            state.entries[state.selectedDay].splice(index, 1);
            if (state.entries[state.selectedDay].length === 0) delete state.entries[state.selectedDay];
            save();
            renderModalEvents();
        }

        elements.addBtn.onclick = () => {
            const text = elements.eventInput.value.trim();
            const time = elements.timeInput.value;
            if (text) {
                if (!state.entries[state.selectedDay]) state.entries[state.selectedDay] = [];
                state.entries[state.selectedDay].push({ text, time });
                elements.eventInput.value = '';
                elements.timeInput.value = '';
                save();
                renderModalEvents();
            }
        };

        elements.eventInput.onkeydown = (e) => {
            if (e.key === 'Enter') elements.addBtn.onclick();
        };

        elements.closeBtn.onclick = closeModal;
        
        elements.clearAllBtn.onclick = () => {
            if (elements.clearAllBtn.dataset.confirm === 'true') {
                delete state.entries[state.selectedDay];
                save();
                renderModalEvents();
                elements.clearAllBtn.textContent = 'Clear All';
                elements.clearAllBtn.dataset.confirm = 'false';
            } else {
                elements.clearAllBtn.textContent = 'Are you sure?';
                elements.clearAllBtn.dataset.confirm = 'true';
                setTimeout(() => {
                    elements.clearAllBtn.textContent = 'Clear All';
                    elements.clearAllBtn.dataset.confirm = 'false';
                }, 3000);
            }
        };

        elements.modal.onclick = (e) => {
            if (e.target === elements.modal) closeModal();
        };

        // Tab Switching
        elements.viewTabs.forEach(tab => {
            tab.onclick = () => {
                elements.viewTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                state.activeView = tab.dataset.view;
                render();
            };
        });

        // Navigation
        elements.prevBtn.onclick = () => {
            const monthIndex = monthNames.indexOf(state.month);
            const daysInPrevMonth = new Date(state.year, monthIndex, 0).getDate();

            if (state.activeView === 'week') {
                state.viewDay -= 7;
                if (state.viewDay < 1) state.viewDay = daysInPrevMonth + state.viewDay;
            } else if (state.activeView === 'day') {
                state.viewDay -= 1;
                if (state.viewDay < 1) state.viewDay = daysInPrevMonth;
            }
            render();
        };

        elements.nextBtn.onclick = () => {
            const monthIndex = monthNames.indexOf(state.month);
            const daysInCurrentMonth = new Date(state.year, monthIndex + 1, 0).getDate();

            if (state.activeView === 'week') {
                state.viewDay += 7;
                if (state.viewDay > daysInCurrentMonth) state.viewDay = state.viewDay - daysInCurrentMonth;
            } else if (state.activeView === 'day') {
                state.viewDay += 1;
                if (state.viewDay > daysInCurrentMonth) state.viewDay = 1;
            }
            render();
        };

        function updateClock() {
            const now = new Date();
            elements.clock.textContent = now.toLocaleTimeString('en-US', { 
                hour12: false, 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
        }

        // Initialize
        render();

        // Update clock every second
        setInterval(updateClock, 1000);

        // Update today periodically
        setInterval(() => {
            const now = new Date().getDate();
            if (now !== state.today) {
                state.today = now;
                state.month = new Intl.DateTimeFormat('en-US', { month: 'long' }).format(new Date());
                render();
            }
        }, 60000);
    </script>
</body>
</html>
